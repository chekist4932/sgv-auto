
gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_types
text/plain
text/css
application/json
application/javascript
application/xml
image/svg+xml;

# Rate limit зона для API (10 req/sec с burst)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    listen [::]:80;

    server_name
    sgvauto.ru
    www.sgvauto.ru
    panel.sgvauto.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server_name www.sgvauto.ru;

    ssl_certificate /etc/letsencrypt/live/sgvauto.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgvauto.ru/privkey.pem;

    return 301 https://sgvauto.ru$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server_name sgvauto.ru;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/sgvauto.ru/chain.pem;

    ssl_certificate /etc/letsencrypt/live/sgvauto.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgvauto.ru/privkey.pem;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log warn;

    # Беза
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options DENY;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "no-referrer-when-downgrade";

    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /api/ {

        # Rate limit
        limit_req zone=api_limit burst=20 nodelay;

        # Preflight OPTIONS
        if ($request_method = OPTIONS) {
            return 204;
        }

        proxy_pass http://backend:8000/api/;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;


        # CORS
        add_header Access-Control-Allow-Origin $http_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization" always;
        add_header Access-Control-Allow-Credentials "true" always;


        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    location /car-image/ {
        proxy_pass http://minio:9000/car-image/;
        proxy_set_header Host $host;

        proxy_buffering on;
        proxy_buffers 8 16k;
        proxy_busy_buffers_size 32k;

        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location / {
        proxy_pass http://frontend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        error_log /var/log/nginx/proxy_error.log debug;

    }

}


server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name panel.sgvauto.ru;

    ssl_stapling on;
    ssl_stapling_verify on;
    ssl_trusted_certificate /etc/letsencrypt/live/sgvauto.ru/chain.pem;

    ssl_certificate /etc/letsencrypt/live/sgvauto.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sgvauto.ru/privkey.pem;

    access_log /var/log/nginx/panel_access.log;
    error_log /var/log/nginx/panel_error.log warn;

    # Безопасность
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    # add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval';" always;

    # Важно для правильной работы схемы (HTTPS)
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port 443;
    proxy_set_header X-Forwarded-Server $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;


    client_max_body_size 50M;

    # Дополнительные настройки для буферизации больших запросов
    client_body_buffer_size 128k;
    client_body_timeout 60s;


    # Основной прокси для админки
    location /admin/ {
        proxy_pass http://backend:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port 443;

        # Подмена HTTP на HTTPS в ответах
        sub_filter_once off;
        sub_filter_types text/html;

        # Заменяем все ссылки на статику
        sub_filter 'http://panel.sgvauto.ru/admin/statics/' 'https://panel.sgvauto.ru/admin/statics/';
        sub_filter 'http://panel.sgvauto.ru/admin/' 'https://panel.sgvauto.ru/admin/';
        sub_filter 'http://panel.sgvauto.ru' 'https://panel.sgvauto.ru';



        # Увеличиваем буферы для больших запросов
        proxy_buffering on;

        proxy_buffer_size 128k;
        proxy_buffers 8 128k;
        proxy_busy_buffers_size 256k;
        proxy_temp_file_write_size 256k;

        # Таймауты
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }
    location /admin/statics/ {
        proxy_pass http://backend:8000/admin/statics/;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";

        add_header Access-Control-Allow-Origin https://sgvauto.ru;
    }

    location /static/ {
        proxy_pass http://backend:8000/static/;
        proxy_set_header Host $host;

        expires 30d;
        add_header Cache-Control "public, immutable, max-age=2592000";
    }
}