version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: backend
    restart: always
    ports:
      - ${APP_PORT}:${APP_PORT}
    environment:
      - DOMAIN_NAME=${DOMAIN_NAME}
      # - SECOND_DOMAIN_NAME=${SECOND_DOMAIN_NAME}
      - APP_NAME=${APP_NAME}
      - STAGE=${STAGE}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - APP_IP=${APP_IP}
      - APP_PORT=${APP_PORT}
      - APP_PATH=${APP_PATH}
      - PROXY_HEADERS=${PROXY_HEADERS}
      - RELOAD=${RELOAD}
      - DB_HOST=${DB_HOST}
      - DB_PORT=${DB_PORT}

      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}

      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION_NAME=${S3_REGION_NAME}
      - S3_ENDPOINT=${S3_ENDPOINT}
      - S3_ACCESS_KEY=${S3_ACCESS_KEY}
      - S3_SECRET_KEY=${S3_SECRET_KEY}

      - TOKEN=${TOKEN}
      - CHAT_ID=${CHAT_ID}

    depends_on:
      - db_postgresql
      - minio
    networks:
      - app_network

  db_postgresql:
    # image: postgres:16.8-alpine3.21
    image: postgres@sha256:3b057e1c2c6dfee60a30950096f3fab33be141dbb0fdd7af3d477083de94166c
    container_name: db_postgresql
    restart: always
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    ports:
      - ${DB_PORT}:${DB_PORT}
    networks:
      - app_network

  minio:
    # image: minio/minio:RELEASE.2025-03-12T18-04-18Z
    image: minio/minio@sha256:46b3009bf7041eefbd90bd0d2b38c6ddc24d20a35d609551a1802c558c1c958f
    container_name: minio
    restart: always
    volumes:
      - minio_data:/data
      - ./minio/scripts/init_minio.sh:/scripts/init_minio.sh:ro
      - ./minio/minio_policy.json:/scripts/minio_policy.json:ro
    environment:
      - MINIO_ROOT_USER=${S3_ACCESS_KEY}
      - MINIO_ROOT_PASSWORD=${S3_SECRET_KEY}
      - MINIO_DEFAULT_BUCKETS=${S3_BUCKET_NAME}
      - MINIO_CONSOLE_USER=${MINIO_CONSOLE_USER}
      - MINIO_CONSOLE_PASSWORD=${MINIO_CONSOLE_PASSWORD}
      - S3_PORT=${S3_PORT}
      - S3_CONSOLE_PORT=${S3_CONSOLE_PORT}
    # expose:
    #   - ${S3_PORT}
    ports:
      - ${S3_PORT}:${S3_PORT}
      - ${S3_CONSOLE_PORT}:${S3_CONSOLE_PORT}
    entrypoint: [ "/bin/sh", "/scripts/init_minio.sh" ]
    depends_on:
      - db_postgresql
    networks:
      - app_network

  frontend:
    build:
      context: ./frontend_redesign
      dockerfile: Dockerfile
      args:
        - VITE_APP_API_URL=${VITE_APP_API_URL}
        - VITE_APP_PORT=${VITE_APP_PORT}
    container_name: frontend
    restart: always
    ports:
      - ${VITE_APP_PORT}:${VITE_APP_PORT}
    depends_on:
      - db_postgresql
      - minio
      - backend
    networks:
      - app_network

  
  proxy-nginx:
    # image: nginx:stable-alpine
    image: nginx@sha256:d2c11a1e63f200585d8225996fd666436277a54e8c0ba728fa9afff28f075bd7
    container_name: proxy-nginx
    volumes:
      - ./nginx/proxy.conf:/etc/nginx/conf.d/default.conf:ro
      - /var/www/certbot:/var/www/certbot
      - /etc/letsencrypt:/etc/letsencrypt:ro

    ports:
      - "80:80" # http
      - "443:443" # https
    restart: always
    depends_on:
      - db_postgresql
      - minio
      - backend
      - frontend
    networks:
      - app_network


volumes:
  postgres_data:
  minio_data:


networks:
  app_network:
